<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 圆角方形背景 -->
  <rect width="64" height="64" rx="14" fill="#d97757"/>

  <!-- 简洁的「申」字：竖线贯穿日字框上下 -->
  <!-- 日字框 -->
  <rect x="16" y="14" width="32" height="36" rx="3" fill="none" stroke="#faf9f5" stroke-width="4"/>
  <!-- 中间横线 -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#faf9f5" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 竖线贯穿外框（申字核心特征：竖明显出头） -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="#faf9f5" stroke-width="3.5" stroke-linecap="round"/>
</svg>
